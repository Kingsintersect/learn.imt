name: Deploy to VPS - Production

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURE THESE for each application — everything else is generic.
#
# To reuse this workflow in another repo:
#   1. Copy this file unchanged.
#   2. Edit the values below (the env block).
#   3. Create one GitHub secret DEV_ENV_FILE with the full contents of .env.production.
#   4. Set the required SSH secrets in GitHub → Settings → Secrets and variables.
#
# Required secrets (same for every app on the same server):
#   DEPLOY_SSH_PRIVATE_KEY  — private key whose public key is in ~/.ssh/authorized_keys
#   DEPLOY_SSH_HOST         — server IP or hostname
#   DEPLOY_SSH_PORT         — SSH port (usually 22)
#   DEPLOY_SSH_USER         — SSH login username
#
# App-specific secrets (one secret covers all env vars):
#   DEV_ENV_FILE            — full contents of .env.production (all runtime + build-time vars)
# ─────────────────────────────────────────────────────────────────────────────
env:
  # ── App identity (change these for each application) ────────────────────────
  APP_NAME: learn.imt.qverselearning.org    # PM2 process name — must be unique per app on the server
  APP_PORT: '3001'                            # port Next.js listens on — must be unique per app on the server
  DOMAIN: learn.imt.qverselearning.org       # public domain name
  LE_EMAIL: support@qverselearning.com        # SSL contact email (cPanel AutoSSL / Let's Encrypt)

  # Backend proxy — set to https://your-api.com/api/v1/ (trailing slash required).
  # Leave empty (BACKEND_URL: '') if this app has no external backend to proxy.
  BACKEND_URL: 'https://imt-orientation-api.qverselearning.org/api/v1/'

  # Webserver that fronts this domain: nginx or apache.
  # On cPanel servers Nginx sits on port 80 in front of Apache — set nginx here
  # so Nginx proxies directly to Next.js, bypassing Apache entirely.
  # Leave blank to auto-detect (auto-detect defaults to apache on cPanel).
  WEBSERVER: nginx

  # ── Infrastructure (no need to change per app) ───────────────────────────────
  NODE_VERSION: '22'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Build
# Runs on every push to main. Produces a deployment archive artifact.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # All build-time vars (NEXT_PUBLIC_* etc.) come from the DEV_ENV_FILE secret.
      # Writing it to .env.production lets Next.js pick them up during the build.
      - name: Build application
        env:
          APP_ENV_FILE: ${{ secrets.DEV_ENV_FILE }}
        run: |
          printf '%s\n' "${APP_ENV_FILE}" > .env.production
          npm run build

      # Archive contains everything the server needs.
      # node_modules is intentionally excluded — npm ci runs on the server.
      # .htaccess is included so cPanel/Apache proxies to Next.js immediately on extract.
      - name: Create deployment archive
        run: |
          tar -czf next-deploy.tar.gz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts \
            ecosystem.config.js \
            scripts \
            .htaccess

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: next-deploy.tar.gz
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Deploy
# Runs only on pushes to main (not on PRs).
# Sequence:
#   1. Transfer archive to server home directory
#   2. Extract archive into app directory (scripts become available)
#   3. Bootstrap VPS (idempotent — skips already-installed tools)
#   4. Upload .env.production from DEV_ENV_FILE secret
#   5. Run deploy script (scoped to this app only)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # Compute APP_DIR here (env context not available in job-level env: blocks).
      # APP_DIR follows the cPanel convention ~/DOMAIN — change the path here if
      # your server uses a different directory layout.
      - name: Set APP_DIR
        run: echo "APP_DIR=/home/${{ secrets.DEPLOY_SSH_USER }}/${{ env.DOMAIN }}" >> $GITHUB_ENV

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      # Register the server once as a named host alias "vps".
      # All subsequent ssh/scp commands use "vps" — no repeated host/port/user.
      # The private key is already loaded by the SSH agent above.
      - name: Configure SSH host alias
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT }} \
            ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName ${{ secrets.DEPLOY_SSH_HOST }}
            Port     ${{ secrets.DEPLOY_SSH_PORT }}
            User     ${{ secrets.DEPLOY_SSH_USER }}
          EOF

      # ── Step 1: Transfer archive ────────────────────────────────────────────
      - name: Transfer archive to server
        run: scp next-deploy.tar.gz vps:~

      # ── Step 2: Extract archive so scripts/ is available ───────────────────
      - name: Extract archive on server
        run: |
          ssh vps "mkdir -p ${{ env.APP_DIR }} && \
             tar -xzf ~/next-deploy.tar.gz -C ${{ env.APP_DIR }} && \
             rm -f ~/next-deploy.tar.gz && \
             chmod +x ${{ env.APP_DIR }}/scripts/bootstrap-vps.sh \
                      ${{ env.APP_DIR }}/scripts/deploy-server.sh"

      # ── Step 3: Bootstrap VPS (idempotent — safe to run on every deploy) ───
      # Installs Node/PM2/Nginx/Certbot only if missing. Warns on port conflicts.
      - name: Bootstrap VPS
        run: ssh vps "bash ${{ env.APP_DIR }}/scripts/bootstrap-vps.sh ${{ secrets.DEPLOY_SSH_USER }}"

      # ── Step 4: Upload env file to server ──────────────────────────────────
      # Writes DEV_ENV_FILE secret as .env.production directly in APP_DIR.
      # deploy-server.sh detects the file and skips re-writing it.
      - name: Upload env file to server
        env:
          APP_ENV_FILE: ${{ secrets.DEV_ENV_FILE }}
        run: |
          printf '%s\n' "${APP_ENV_FILE}" > .env.production
          scp .env.production vps:${{ env.APP_DIR }}/.env.production

      # ── Step 5: Deploy app (scoped to this app only) ────────────────────────
      - name: Deploy application
        run: |
          ssh vps "bash ${{ env.APP_DIR }}/scripts/deploy-server.sh \
               '${{ env.APP_DIR }}' \
               '${{ env.APP_NAME }}' \
               '${{ env.APP_PORT }}' \
               '${{ env.DOMAIN }}' \
               '${{ env.LE_EMAIL }}' \
               '${{ env.BACKEND_URL }}' \
               '${{ env.WEBSERVER }}'"
